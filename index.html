<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIM Chatbot</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chat-container{
width:95%;
max-width:450px;
height:90vh;
background:white;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
overflow:hidden;
display:flex;
flex-direction:column;
}

.header{
background:#0056d2;
color:white;
padding:18px;
text-align:center;
}

.header h2{
font-size:22px;
}

.header p{
font-size:13px;
opacity:0.9;
}

.chat-box{
flex:1;
padding:15px;
overflow-y:auto;
background:#eef3ff;
}

.message{
max-width:80%;
padding:12px;
margin:8px 0;
border-radius:15px;
word-wrap:break-word;
}

.user{
background:#0056d2;
color:white;
margin-left:auto;
border-bottom-right-radius:5px;
}

.bot{
background:white;
border:1px solid #ddd;
border-bottom-left-radius:5px;
}

.input-area{
display:flex;
padding:10px;
background:white;
border-top:1px solid #ddd;
}

input{
flex:1;
padding:12px;
border:1px solid #ccc;
border-radius:10px;
outline:none;
}

button{
margin-left:10px;
padding:12px 18px;
border:none;
background:#0056d2;
color:white;
border-radius:10px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.quick-buttons{
padding:10px;
display:flex;
gap:8px;
overflow-x:auto;
background:white;
}

.quick-buttons button{
background:#e8f0ff;
color:#0056d2;
padding:8px 12px;
white-space:nowrap;
}
</style>
</head>

<body>

<div class="chat-container">

<div class="header">
<h2>AIM Chatbot</h2>
<p>AIM Upskill Technologies Pvt. Ltd.</p>
</div>

<div class="quick-buttons">
<button onclick="quickAsk('courses')">Courses</button>
<button onclick="quickAsk('contact')">Contact</button>
<button onclick="quickAsk('location')">Location</button>
<button onclick="quickAsk('placement')">Placement</button>
</div>

<div class="chat-box" id="chatBox">
<div class="message bot">
Hello 👋<br>
Welcome to AIM Upskill Technologies.<br>
How can I help you today?
</div>
</div>

<div class="input-area">
<input type="text" id="userInput" placeholder="Type your question...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

function addMessage(text,type){
let chatBox=document.getElementById("chatBox");

let msg=document.createElement("div");
msg.className="message "+type;
msg.innerHTML=text;

chatBox.appendChild(msg);
chatBox.scrollTop=chatBox.scrollHeight;
}

function getBotResponse(input){

input=input.toLowerCase();

if(input.includes("hi") || input.includes("hello"))
return "Hello! Welcome to AIM Upskill Technologies.";

if(input.includes("name"))
return "Our institute name is AIM Upskill Technologies Pvt. Ltd.";

if(input.includes("courses"))
return "Courses: Python, Java, Data Science, Machine Learning, Full Stack Development, Cyber Security, Networking, C, C++ and more.";

if(input.includes("python"))
return "We provide Core Python, Advanced Python and Full Stack Python training.";

if(input.includes("java"))
return "We provide Core Java, Advanced Java and Full Stack Java training.";

if(input.includes("location"))
return "Old Gajuwaka Junction, Opp Signal Point, Visakhapatnam.";

if(input.includes("contact"))
return "Phone: 9700029913<br>Phone: 7989599972";

if(input.includes("email"))
return "aimsoftwaretechnologiesvsp@gmail.com";

if(input.includes("placement"))
return "We provide placement assistance and career guidance.";

if(input.includes("timing"))
return "Institute timings: 9:00 AM to 8:00 PM";

return "Sorry, I didn't understand. Please ask about courses, contact, location, timings or placements.";
}

function sendMessage(){

let input=document.getElementById("userInput");

if(input.value.trim()==="") return;

addMessage(input.value,"user");

let response=getBotResponse(input.value);

setTimeout(()=>{
addMessage(response,"bot");
},500);

input.value="";
}

function quickAsk(text){
document.getElementById("userInput").value=text;
sendMessage();
}

document.getElementById("userInput")
.addEventListener("keypress",function(e){
if(e.key==="Enter"){
sendMessage();
}
});

</script>
<script>
window.onload=function(){

setTimeout(()=>{

addMessage(
"🎓 Welcome to AIM Professional Computer Training Center! Ask me about courses, placements, contact details or location.",
"bot"
);

},500);

}
</script>
</body>
</html>
